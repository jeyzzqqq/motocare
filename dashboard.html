<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoCare - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.16.29/font/lucide.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 min-h-screen pb-20">
    <div class="max-w-lg mx-auto">
        <div class="p-4 space-y-6">
            <!-- Header -->
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl text-gray-800">Dashboard</h1>
                    <p class="text-gray-500 text-sm mt-1">Welcome back, <span id="userName">Rider</span>!</p>
                </div>
                <button id="logoutBtn" class="p-2.5 bg-white rounded-full shadow-md hover:bg-gray-50 transition-colors">
                    <i class="lucide lucide-log-out text-gray-600 text-xl"></i>
                </button>
            </div>

            <!-- Quick Stats -->
            <div class="grid grid-cols-2 gap-4">
                <div onclick="window.location.href='history.html'" class="bg-gradient-to-br from-green-700 to-green-900 rounded-2xl p-5 text-white shadow-lg cursor-pointer hover:scale-105 transition-transform active:scale-95">
                    <i class="lucide lucide-calendar text-3xl mb-2 opacity-80"></i>
                    <p class="text-2xl font-bold" id="totalServices">11</p>
                    <p class="text-sm opacity-90">Total Services</p>
                </div>
                <div onclick="window.location.href='expenses.html'" class="bg-white rounded-2xl p-5 shadow-md border border-gray-100 cursor-pointer hover:shadow-lg transition-shadow active:scale-95">
                    <i class="lucide lucide-dollar-sign text-green-700 text-3xl mb-2"></i>
                    <p class="text-2xl font-bold text-gray-800" id="totalSpent">$770</p>
                    <p class="text-sm text-gray-500">Total Spent</p>
                </div>
            </div>

            <!-- Upcoming Maintenance -->
            <div class="bg-white rounded-2xl p-5 shadow-md border border-gray-100">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-gray-800">Upcoming Maintenance</h2>
                    <button onclick="window.location.href='schedule.html'" class="text-xs text-green-700 bg-green-50 px-3 py-1 rounded-full hover:bg-green-100 transition-colors flex items-center gap-1">
                        View All
                        <i class="lucide lucide-chevron-right text-xs"></i>
                    </button>
                </div>
                <div id="upcomingMaintenanceList" class="space-y-3">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>

            <!-- Recent Repairs -->
            <div class="bg-white rounded-2xl p-5 shadow-md border border-gray-100">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-gray-800">Recent Repairs</h2>
                    <button onclick="window.location.href='history.html'" class="text-xs text-green-700 hover:underline flex items-center gap-1">
                        See All
                        <i class="lucide lucide-chevron-right text-xs"></i>
                    </button>
                </div>
                <div id="recentRepairsList" class="space-y-3">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>

            <!-- Expense Summary Chart -->
            <div class="bg-white rounded-2xl p-5 shadow-md border border-gray-100">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-gray-800">Expense Summary</h2>
                    <i class="lucide lucide-trending-up text-green-700"></i>
                </div>
                <div class="h-48">
                    <canvas id="expenseChart"></canvas>
                </div>
            </div>

            <!-- Maintenance Overview Chart -->
            <div class="bg-white rounded-2xl p-5 shadow-md border border-gray-100">
                <h2 class="text-gray-800 mb-4">Maintenance Overview</h2>
                <div class="flex items-center gap-6">
                    <div class="w-32 h-32">
                        <canvas id="maintenancePieChart"></canvas>
                    </div>
                    <div class="flex-1 space-y-3" id="maintenanceLegend">
                        <!-- Will be populated by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-40">
        <div class="max-w-lg mx-auto px-4 py-2">
            <div class="flex justify-around items-center">
                <a href="dashboard.html" class="flex flex-col items-center py-2 px-3 rounded-lg transition-all text-green-700">
                    <i class="lucide lucide-home text-2xl scale-110"></i>
                    <span class="text-xs mt-1 font-medium">Home</span>
                    <div class="absolute -bottom-0.5 w-12 h-1 bg-green-700 rounded-full"></div>
                </a>
                <a href="profile.html" class="flex flex-col items-center py-2 px-3 rounded-lg transition-all text-gray-400 hover:text-gray-600">
                    <i class="lucide lucide-bike text-2xl"></i>
                    <span class="text-xs mt-1 font-medium">Profile</span>
                </a>
                <a href="schedule.html" class="flex flex-col items-center py-2 px-3 rounded-lg transition-all text-gray-400 hover:text-gray-600">
                    <i class="lucide lucide-calendar text-2xl"></i>
                    <span class="text-xs mt-1 font-medium">Schedule</span>
                </a>
                <a href="history.html" class="flex flex-col items-center py-2 px-3 rounded-lg transition-all text-gray-400 hover:text-gray-600">
                    <i class="lucide lucide-history text-2xl"></i>
                    <span class="text-xs mt-1 font-medium">History</span>
                </a>
                <a href="expenses.html" class="flex flex-col items-center py-2 px-3 rounded-lg transition-all text-gray-400 hover:text-gray-600">
                    <i class="lucide lucide-dollar-sign text-2xl"></i>
                    <span class="text-xs mt-1 font-medium">Expenses</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Floating Action Button -->
    <a href="add-record.html" class="fixed bottom-24 right-4 bg-green-700 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-xl hover:bg-green-800 transition-all hover:scale-110 active:scale-95 z-30">
        <i class="lucide lucide-plus text-3xl"></i>
    </a>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2 max-w-sm"></div>

    <script type="module" src="./js/firebase-config.js"></script>
    <script src="./js/utils.js"></script>
    <script type="module" src="./js/dashboard.js"></script>
</body>
</html>
