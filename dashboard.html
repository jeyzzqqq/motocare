<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoCare - Dashboard</title>
    <link rel="icon" href="assets/images/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.16.29/font/lucide.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Logout button enhanced styling */
        .logout-btn {
            position: relative;
            transition: all 0.3s ease;
        }
        .logout-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 16px rgba(239, 68, 68, 0.4);
        }
        .logout-btn:active {
            transform: scale(0.95);
        }
        /* Tooltip styling */
        .logout-tooltip {
            position: absolute;
            bottom: -40px;
            right: 0;
            background-color: rgba(239, 68, 68, 0.95);
            color: white;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 50;
            backdrop-filter: blur(4px);
        }
        .logout-btn:hover .logout-tooltip {
            opacity: 1;
        }
        /* Logout icon button (rounded UI style) */
        .logout-icon-btn {
            background-color: #ffffff;
            color: #faf6f6; /* icon color */
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 9999px; /* fully rounded */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            transition: background-color 0.18s ease, transform 0.12s ease;
        }
        .logout-icon-btn:active { transform: scale(0.98); }
        .logout-icon-btn:hover { background-color: #f3f4f6; }
        .logout-icon-btn svg { display: block; }
        /* Dark mode: invert for visibility */
        @media (prefers-color-scheme: dark) {
            .logout-icon-btn { background-color: #0f172a; color: #f8fafc; }
            .logout-icon-btn:hover { background-color: #0b1220; }
        }
        .btn-danger:active {
            transform: scale(0.98);
        }
    </style>
<body class="bg-gray-50 min-h-screen pb-32">
    <div class="max-w-lg mx-auto">
        <div class="p-4 space-y-6">
            <!-- Header -->
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl text-gray-800">Dashboard</h1>
                    <p class="text-gray-500 text-sm mt-1">Welcome back, <span id="userName">Rider</span>!</p>
                </div>
                <div class="ml-4"></div>
                <div class="relative">
                    <button id="logoutBtn" class="logout-btn logout-icon-btn" title="Logout from MotoCare" aria-label="Logout">
                        <!-- Rounded square with exiting arrow (slightly overlapping) -->
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <!-- rounded square box -->
                            <rect x="3" y="5" width="12" height="14" rx="3" stroke="currentColor" stroke-width="1.6" fill="none" />
                            <!-- shaft that exits the box -->
                            <path d="M11 12H21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                            <!-- arrow head outside the box -->
                            <path d="M18 9L22 12L18 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <span class="logout-tooltip">Logout</span>
                    </button>
                </div>
            </div>

            <!-- Quick Stats -->
            <div class="grid grid-cols-2 gap-4">
                <div onclick="window.location.href='history.html'" class="bg-gradient-to-br from-green-700 to-green-900 rounded-2xl p-5 text-white shadow-lg cursor-pointer hover:scale-105 transition-transform active:scale-95">
                    <i class="lucide lucide-calendar text-3xl mb-2 opacity-80"></i>
                    <p class="text-2xl font-bold" id="totalRepairs">0</p>
                    <p class="text-sm opacity-90">Total Repairs</p>
                    
                </div>
                <div onclick="window.location.href='expenses.html'" class="bg-white rounded-2xl p-5 shadow-md border border-gray-100 cursor-pointer hover:shadow-lg transition-shadow active:scale-95">
                    <i class="lucide lucide-dollar-sign text-green-700 text-3xl mb-2"></i>
                    <p class="text-2xl font-bold text-gray-800" id="totalSpent">₱0</p>
                    <p class="text-sm text-gray-500">Total Spent</p>
                </div>
            </div>

            <!-- Upcoming Maintenance -->
            <div class="bg-white rounded-2xl p-5 shadow-md border border-gray-100">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-gray-800">Upcoming Maintenance</h2>
                    <button onclick="window.location.href='schedule.html'" class="text-xs text-green-700 bg-green-50 px-3 py-1 rounded-full hover:bg-green-100 transition-colors flex items-center gap-1">
                        View All
                        <i class="lucide lucide-chevron-right text-xs"></i>
                    </button>
                </div>
                <div id="upcomingMaintenanceList" class="space-y-3">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>

            <!-- Recent Repairs -->
            <div class="bg-white rounded-2xl p-5 shadow-md border border-gray-100">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-gray-800">Recent Repairs</h2>
                    <button onclick="window.location.href='history.html'" class="text-xs text-green-700 hover:underline flex items-center gap-1">
                        See All
                        <i class="lucide lucide-chevron-right text-xs"></i>
                    </button>
                </div>
                <div id="recentRepairsList" class="space-y-3">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>

            <!-- Expense Summary Chart -->
            <div class="bg-white rounded-2xl p-5 shadow-md border border-gray-100">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-gray-800">Expense Summary</h2>
                    <i class="lucide lucide-trending-up text-green-700"></i>
                </div>
                <div class="h-48">
                    <canvas id="expenseChart"></canvas>
                </div>
            </div>

            <!-- Maintenance Overview Chart -->
            <div class="bg-white rounded-2xl p-5 shadow-md border border-gray-100">
                <h2 class="text-gray-800 mb-4">Maintenance Overview</h2>
                <div class="flex items-center gap-6">
                    <div class="w-32 h-32">
                        <canvas id="maintenancePieChart"></canvas>
                    </div>
                    <div class="flex-1 space-y-3" id="maintenanceLegend">
                        <!-- Will be populated by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="mobileNav"></div>

        

    <!-- Floating Action Button -->
    <a href="add-record.html" title="Add record" aria-label="Add record" class="fixed bottom-24 right-4 bg-green-700 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-xl hover:bg-green-800 transition-all hover:scale-110 active:scale-95 z-30">
        <i class="fa-solid fa-circle-plus text-2xl" aria-hidden="true"></i>
    </a>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2 max-w-sm"></div>

    <script type="module" src="./js/firebase-config.js"></script>
    <script src="./js/utils.js"></script>
    <script type="module" src="./js/mobile-nav.js"></script>
    <!-- Cache-busting query to ensure latest dashboard.js is loaded -->
    <script type="module" src="./js/dashboard.js?v=2"></script>
</body>
</html>
