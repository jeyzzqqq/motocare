<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoCare - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen pb-32">
    <div class="max-w-lg mx-auto">
        <!-- Header -->
        <div class="p-4">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl text-gray-800">My Motorcycles</h1>
                    <p class="text-gray-500 text-sm mt-1">Manage your bike collection</p>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="p-6 space-y-6">
            


            <!-- Motorcycles List (embedded) -->
            <div class="space-y-4">
                <div id="emptyState" class="bg-white rounded-2xl p-10 shadow-md border border-gray-100 text-center hidden max-w-2xl mx-auto">
                    <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-6">
                        <i class="fa-solid fa-motorcycle text-gray-400 text-5xl"></i>
                    </div>
                    <h3 class="text-gray-800 font-medium mb-2 text-lg">No motorcycles yet</h3>
                    <p class="text-gray-500 text-sm mb-6">Add your first motorcycle to get started</p>
                    <button onclick="openAddModal()" class="bg-green-700 text-white px-6 py-3 rounded-full hover:bg-green-800 transition-all shadow-lg active:scale-95 inline-flex items-center gap-3">
                        <i class="fa-solid fa-plus"></i>
                        <span class="font-medium">Add Motorcycle</span>
                    </button>
                </div>

                <!-- Motorcycles List -->
                <div id="motorcyclesList" class="space-y-4"></div>

                <!-- Add Another Button -->
                <button id="addAnotherBtn" onclick="openAddModal()" class="w-full py-4 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 hover:border-green-700 hover:text-green-700 hover:bg-green-50 transition-all flex items-center justify-center gap-2 hidden">
                    <i class="fa-solid fa-plus text-xl"></i>
                    Add Another Motorcycle
                </button>
            </div>

            <!-- Modal Backdrop -->
            <div id="modalBackdrop" class="fixed inset-0 bg-black/50 z-40 hidden modal-backdrop" onclick="closeModal()"></div>

            <!-- Add/Edit Modal -->
            <div id="motorcycleModal" class="fixed inset-x-0 bottom-0 z-50 bg-white rounded-t-3xl p-6 max-h-[90vh] overflow-y-auto hidden">
                <div class="max-w-lg mx-auto">
                    <div class="flex items-center justify-between mb-6">
                        <h2 id="modalTitle" class="text-2xl font-bold text-gray-800">Add Motorcycle</h2>
                        <button onclick="closeModal()" class="p-2 hover:bg-gray-100 rounded-full transition-colors">
                            <i class="fa-solid fa-xmark text-gray-600 text-2xl"></i>
                        </button>
                    </div>

                    <form id="motorcycleForm" class="space-y-4">
                        <div>
                            <label class="block text-gray-700 mb-2 text-sm font-medium">Brand *</label>
                            <select id="brandSelect" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent">
                                <option value="">Select Brand</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-gray-700 mb-2 text-sm font-medium">Model *</label>
                            <select id="modelSelect" required disabled class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent disabled:opacity-50 disabled:cursor-not-allowed">
                                <option value="">Select Brand First</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-gray-700 mb-2 text-sm font-medium">Year *</label>
                            <select id="yearSelect" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent">
                                <option value="">Select Year</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-gray-700 mb-2 text-sm font-medium">Plate Number *</label>
                            <input type="text" id="plateInput" placeholder="ABC-1234" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent uppercase">
                        </div>

                        <div>
                            <label class="block text-gray-700 mb-2 text-sm font-medium">Color *</label>
                            <select id="colorInput" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent">
                                <option value="">Select Color</option>
                                <option>Black</option>
                                <option>White</option>
                                <option>Red</option>
                                <option>Blue</option>
                                <option>Gray</option>
                                <option>Silver</option>
                                <option>Yellow</option>
                                <option>Orange</option>
                                <option>Green</option>
                                <option>Brown</option>
                                <option>Gold</option>
                                <option>Purple</option>
                                <option>Pink</option>
                                <option>Matte Black</option>
                                <option>Matte Gray</option>
                                <option>Matte Blue</option>
                                <option>Matte Red</option>
                                <option>Pearl White</option>
                                <option>Candy Red</option>
                                <option>Metallic Blue</option>
                                <option>Carbon Black</option>
                                <option>Army Green</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-gray-700 mb-2 text-sm font-medium">Current Mileage *</label>
                            <input type="number" id="mileageInput" placeholder="12450" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent">
                        </div>

                        <div class="flex gap-3 pt-4">
                            <button type="button" onclick="closeModal()" class="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl hover:bg-gray-300 transition-all active:scale-95">Cancel</button>
                            <button type="submit" class="flex-1 py-3 bg-green-700 text-white rounded-xl hover:bg-green-800 transition-all shadow-lg active:scale-95"><span id="submitBtnText">Add Motorcycle</span></button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Stats removed per user request -->

        </div>
    </div>

    <!-- Floating Add Record Button -->
    <a href="add-record.html" title="Add record" aria-label="Add record" class="fixed bottom-24 right-4 bg-green-700 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-xl hover:bg-green-800 transition-all hover:scale-110 active:scale-95 z-30">
        <i class="fa-solid fa-plus text-xl"></i>
    </a>

    <!-- Mobile Navigation -->
    <div id="mobileNav"></div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- Scripts -->
    <script type="module" src="./js/firebase-config.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/mobile-nav.js"></script>
    <script type="module" src="./js/motorcycles.js?v=2"></script>
    <script type="module" src="./js/profile.js"></script>
</body>
</html>
