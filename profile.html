<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoCare - Motorcycle Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.16.29/font/lucide.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen pb-20">
    <div class="max-w-lg mx-auto">
        <div class="p-4 space-y-6">
            <!-- Header -->
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl text-gray-800">Motorcycle Profile</h1>
                    <p class="text-gray-500 text-sm mt-1">Manage your bike details</p>
                </div>
                <button id="editToggleBtn" onclick="toggleEdit()" class="p-2.5 rounded-full shadow-md transition-all hover:scale-110 active:scale-95 bg-white text-gray-600 hover:bg-gray-50">
                    <i id="editIcon" class="lucide lucide-edit-2 text-xl"></i>
                </button>
            </div>

            <!-- Motorcycle Hero Card -->
            <div class="bg-gradient-to-br from-green-700 to-green-900 rounded-2xl p-6 text-white shadow-xl">
                <div class="flex items-center justify-center mb-4">
                    <div class="w-24 h-24 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm">
                        <i class="lucide lucide-bike text-white text-5xl"></i>
                    </div>
                </div>
                <h2 class="text-center text-2xl font-bold" id="displayMakeModel">Honda CBR 600RR</h2>
                <p class="text-center text-green-100 text-sm mt-1">Year <span id="displayYear">2024</span></p>
                <div class="mt-4 pt-4 border-t border-white/20 flex justify-around">
                    <div class="text-center">
                        <p class="text-2xl font-bold" id="displayMileage">12,450</p>
                        <p class="text-xs text-green-100">Miles</p>
                    </div>
                    <div class="text-center">
                        <p class="text-2xl font-bold" id="displayColor">Racing Red</p>
                        <p class="text-xs text-green-100">Color</p>
                    </div>
                </div>
            </div>

            <!-- Basic Information -->
            <div class="bg-white rounded-2xl p-5 shadow-md border border-gray-100 space-y-4">
                <h3 class="text-gray-800 mb-4">Basic Information</h3>

                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
                    <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center shrink-0">
                        <i class="lucide lucide-bike text-green-700 text-xl"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs text-gray-500 mb-1">Make & Model</p>
                        <input type="text" id="makeModel" value="Honda CBR 600RR" disabled
                            class="w-full text-gray-800 font-medium bg-transparent border-0 focus:outline-none focus:ring-2 focus:ring-green-700 rounded px-2 py-1">
                    </div>
                </div>

                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
                    <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center shrink-0">
                        <i class="lucide lucide-calendar text-green-700 text-xl"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs text-gray-500 mb-1">Year</p>
                        <input type="text" id="year" value="2024" disabled
                            class="w-full text-gray-800 font-medium bg-transparent border-0 focus:outline-none focus:ring-2 focus:ring-green-700 rounded px-2 py-1">
                    </div>
                </div>

                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
                    <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center shrink-0">
                        <i class="lucide lucide-gauge text-green-700 text-xl"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs text-gray-500 mb-1">Current Mileage</p>
                        <input type="text" id="mileage" value="12,450" disabled
                            class="w-full text-gray-800 font-medium bg-transparent border-0 focus:outline-none focus:ring-2 focus:ring-green-700 rounded px-2 py-1">
                    </div>
                </div>

                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
                    <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center shrink-0">
                        <i class="lucide lucide-fuel text-green-700 text-xl"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs text-gray-500 mb-1">Fuel Type</p>
                        <input type="text" id="fuelType" value="Gasoline" disabled
                            class="w-full text-gray-800 font-medium bg-transparent border-0 focus:outline-none focus:ring-2 focus:ring-green-700 rounded px-2 py-1">
                    </div>
                </div>
            </div>

            <!-- Registration Details -->
            <div class="bg-white rounded-2xl p-5 shadow-md border border-gray-100 space-y-4">
                <h3 class="text-gray-800 mb-4">Registration Details</h3>

                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
                    <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center shrink-0">
                        <i class="lucide lucide-map-pin text-green-700 text-xl"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs text-gray-500 mb-1">VIN Number</p>
                        <input type="text" id="vin" value="1HGBH41JXMN109186" disabled
                            class="w-full text-gray-800 font-medium bg-transparent border-0 focus:outline-none focus:ring-2 focus:ring-green-700 rounded px-2 py-1">
                    </div>
                </div>

                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
                    <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center shrink-0">
                        <i class="lucide lucide-map-pin text-green-700 text-xl"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs text-gray-500 mb-1">Plate Number</p>
                        <input type="text" id="plateNumber" value="MC-4567" disabled
                            class="w-full text-gray-800 font-medium bg-transparent border-0 focus:outline-none focus:ring-2 focus:ring-green-700 rounded px-2 py-1">
                    </div>
                </div>

                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
                    <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center shrink-0">
                        <i class="lucide lucide-calendar text-green-700 text-xl"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs text-gray-500 mb-1">Purchase Date</p>
                        <input type="text" id="purchaseDate" value="Jan 15, 2024" disabled
                            class="w-full text-gray-800 font-medium bg-transparent border-0 focus:outline-none focus:ring-2 focus:ring-green-700 rounded px-2 py-1">
                    </div>
                </div>

                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
                    <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center shrink-0">
                        <i class="lucide lucide-palette text-green-700 text-xl"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs text-gray-500 mb-1">Color</p>
                        <input type="text" id="color" value="Racing Red" disabled
                            class="w-full text-gray-800 font-medium bg-transparent border-0 focus:outline-none focus:ring-2 focus:ring-green-700 rounded px-2 py-1">
                    </div>
                </div>
            </div>

            <!-- Action Buttons (shown when editing) -->
            <div id="actionButtons" class="flex gap-3 hidden">
                <button onclick="cancelEdit()" class="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl hover:bg-gray-300 transition-all active:scale-95">
                    Cancel
                </button>
                <button onclick="saveProfile()" class="flex-1 py-3 bg-green-700 text-white rounded-xl hover:bg-green-800 transition-all shadow-lg active:scale-95">
                    Save Changes
                </button>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-40">
        <div class="max-w-lg mx-auto px-4 py-2">
            <div class="flex justify-around items-center">
                <a href="dashboard.html" class="flex flex-col items-center py-2 px-3 rounded-lg transition-all text-gray-400 hover:text-gray-600">
                    <i class="lucide lucide-home text-2xl"></i>
                    <span class="text-xs mt-1 font-medium">Home</span>
                </a>
                <a href="profile.html" class="flex flex-col items-center py-2 px-3 rounded-lg transition-all text-green-700">
                    <i class="lucide lucide-bike text-2xl scale-110"></i>
                    <span class="text-xs mt-1 font-medium">Profile</span>
                    <div class="absolute -bottom-0.5 w-12 h-1 bg-green-700 rounded-full"></div>
                </a>
                <a href="schedule.html" class="flex flex-col items-center py-2 px-3 rounded-lg transition-all text-gray-400 hover:text-gray-600">
                    <i class="lucide lucide-calendar text-2xl"></i>
                    <span class="text-xs mt-1 font-medium">Schedule</span>
                </a>
                <a href="history.html" class="flex flex-col items-center py-2 px-3 rounded-lg transition-all text-gray-400 hover:text-gray-600">
                    <i class="lucide lucide-history text-2xl"></i>
                    <span class="text-xs mt-1 font-medium">History</span>
                </a>
                <a href="expenses.html" class="flex flex-col items-center py-2 px-3 rounded-lg transition-all text-gray-400 hover:text-gray-600">
                    <i class="lucide lucide-dollar-sign text-2xl"></i>
                    <span class="text-xs mt-1 font-medium">Expenses</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Floating Action Button -->
    <a href="add-record.html" class="fixed bottom-24 right-4 bg-green-700 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-xl hover:bg-green-800 transition-all hover:scale-110 active:scale-95 z-30">
        <i class="lucide lucide-plus text-3xl"></i>
    </a>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2 max-w-sm"></div>

    <script type="module" src="./js/firebase-config.js"></script>
    <script src="./js/utils.js"></script>
    <script type="module" src="./js/profile.js"></script>
</body>
</html>
