<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoCare - Maintenance Schedule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.16.29/font/lucide.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-dot {
            animation: pulse-dot 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-32">
    <div class="max-w-lg mx-auto">
        <div class="p-4 space-y-6">
            <!-- Header -->
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl text-gray-800">Maintenance Schedule</h1>
                    <p class="text-gray-500 text-sm mt-1">Reminders grouped by motorcycle from your profile</p>
                    <p id="selectedMotorcycleLabel" class="text-xs text-green-700 font-medium mt-2">Select a motorcycle</p>
                </div>
                <button id="motorcycleDrawerButton" type="button" class="p-2.5 bg-white rounded-full shadow-md" aria-label="Select motorcycle">
                    <i class="lucide lucide-menu text-gray-600 text-xl"></i>
                </button>
            </div>

            <!-- Summary Cards -->
            <div class="grid grid-cols-3 gap-3">
                <div class="bg-red-50 rounded-xl p-4 text-center border border-red-100">
                    <p class="text-2xl font-bold text-red-600" id="dueCount">0</p>
                    <p class="text-xs text-red-600 mt-1">Due Now</p>
                </div>
                <div class="bg-gray-50 rounded-xl p-4 text-center border border-gray-200">
                    <p class="text-2xl font-bold text-gray-600" id="upcomingCount">0</p>
                    <p class="text-xs text-gray-600 mt-1">Upcoming</p>
                </div>
                <div class="bg-green-50 rounded-xl p-4 text-center border border-green-100">
                    <p class="text-2xl font-bold text-green-700" id="completedCount">0</p>
                    <p class="text-xs text-green-700 mt-1">Completed</p>
                </div>
            </div>

            <!-- Timeline -->
            <div>
                <h2 class="text-gray-800 mb-4">All Reminders</h2>
                
                <div class="relative">
                    <!-- Timeline Line -->
                    <div class="absolute left-5 top-8 bottom-8 w-0.5 bg-gray-200"></div>
                    
                    <!-- Timeline Items -->
                    <div id="scheduleList" class="space-y-4">
                        <!-- Will be populated by JavaScript -->
                    </div>
                </div>
            </div>

            <!-- Priority Legend -->
            <div class="bg-white rounded-2xl p-4 shadow-md border border-gray-100">
                <h3 class="text-gray-800 text-sm mb-3">Priority Legend</h3>
                <div class="flex items-center justify-around">
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-red-500"></div>
                        <span class="text-xs text-gray-600">High</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                        <span class="text-xs text-gray-600">Medium</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-green-500"></div>
                        <span class="text-xs text-gray-600">Low</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Motorcycle Drawer -->
    <div id="motorcycleDrawerBackdrop" class="fixed inset-0 bg-black/40 hidden z-40"></div>
    <aside id="motorcycleDrawer" class="fixed top-0 left-0 h-full w-[86%] max-w-sm bg-white shadow-2xl z-50 hidden -translate-x-full transition-transform duration-200 ease-out">
        <div class="p-4 border-b border-gray-100 flex items-center justify-between">
            <div>
                <h2 class="text-lg font-semibold text-gray-800">Select Unit</h2>
                <p class="text-xs text-gray-500 mt-1">Choose one motorcycle to view its reminders</p>
            </div>
            <button id="motorcycleDrawerCloseButton" type="button" class="w-9 h-9 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center" aria-label="Close motorcycle selector">
                <i class="lucide lucide-x text-lg"></i>
            </button>
        </div>
        <div class="p-4 space-y-3 overflow-y-auto h-[calc(100%-73px)]" id="motorcycleDrawerList">
            <div class="text-sm text-gray-500">Loading motorcycles...</div>
        </div>
    </aside>

    <div id="mobileNav"></div>

    <!-- Floating Action Button -->
    <a href="add-record.html" class="fixed bottom-24 right-4 bg-green-700 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-xl hover:bg-green-800 transition-all hover:scale-110 active:scale-95 z-30">
        <i class="lucide lucide-plus text-3xl"></i>
    </a>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2 max-w-sm"></div>

    <script type="module" src="./js/firebase-config.js"></script>
    <script src="./js/utils.js"></script>
    <script type="module" src="./js/mobile-nav.js"></script>
    <script type="module" src="./js/schedule.js"></script>
</body>
</html>
