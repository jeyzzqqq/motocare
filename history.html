<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoCare - Repair History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.16.29/font/lucide.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen pb-20">
    <div class="max-w-lg mx-auto">
        <div class="p-4 space-y-6">
            <!-- Header -->
            <div>
                <h1 class="text-3xl text-gray-800">Repair History</h1>
                <p class="text-gray-500 text-sm mt-1">View all past services</p>
            </div>

            <!-- Search Bar -->
            <div class="relative">
                <i class="lucide lucide-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl"></i>
                <input type="text" id="searchInput" placeholder="Search repairs..." 
                    class="w-full pl-12 pr-4 py-3.5 bg-white border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent shadow-sm">
            </div>

            <!-- Summary Stats -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white rounded-xl p-4 shadow-md border border-gray-100">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                            <i class="lucide lucide-check-circle-2 text-green-700 text-2xl"></i>
                        </div>
                        <div>
                            <p class="text-2xl font-bold text-gray-800" id="totalRepairs">0</p>
                            <p class="text-xs text-gray-500">Total Repairs</p>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-xl p-4 shadow-md border border-gray-100">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                            <i class="lucide lucide-dollar-sign text-green-700 text-2xl"></i>
                        </div>
                        <div>
                            <p class="text-2xl font-bold text-gray-800" id="totalHistorySpent">$0</p>
                            <p class="text-xs text-gray-500">Total Spent</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Repair Records List -->
            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-gray-800">All Records</h2>
                    <span class="text-xs text-gray-500" id="recordCount">0 entries</span>
                </div>

                <div id="historyList">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>

            <!-- Export Button -->
            <button onclick="exportHistory()" class="w-full py-3.5 bg-white text-gray-700 rounded-xl border border-gray-200 hover:bg-gray-50 transition-all shadow-sm flex items-center justify-center gap-2 active:shadow-inner active:scale-95">
                <i class="lucide lucide-file-text text-xl"></i>
                <span>Export History</span>
            </button>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-40">
        <div class="max-w-lg mx-auto px-4 py-2">
            <div class="flex justify-around items-center">
                <a href="dashboard.html" class="flex flex-col items-center py-2 px-3 rounded-lg transition-all text-gray-400 hover:text-gray-600">
                    <i class="lucide lucide-home text-2xl"></i>
                    <span class="text-xs mt-1 font-medium">Home</span>
                </a>
                <a href="profile.html" class="flex flex-col items-center py-2 px-3 rounded-lg transition-all text-gray-400 hover:text-gray-600">
                    <i class="lucide lucide-bike text-2xl"></i>
                    <span class="text-xs mt-1 font-medium">Profile</span>
                </a>
                <a href="schedule.html" class="flex flex-col items-center py-2 px-3 rounded-lg transition-all text-gray-400 hover:text-gray-600">
                    <i class="lucide lucide-calendar text-2xl"></i>
                    <span class="text-xs mt-1 font-medium">Schedule</span>
                </a>
                <a href="history.html" class="flex flex-col items-center py-2 px-3 rounded-lg transition-all text-green-700">
                    <i class="lucide lucide-history text-2xl scale-110"></i>
                    <span class="text-xs mt-1 font-medium">History</span>
                    <div class="absolute -bottom-0.5 w-12 h-1 bg-green-700 rounded-full"></div>
                </a>
                <a href="expenses.html" class="flex flex-col items-center py-2 px-3 rounded-lg transition-all text-gray-400 hover:text-gray-600">
                    <i class="lucide lucide-dollar-sign text-2xl"></i>
                    <span class="text-xs mt-1 font-medium">Expenses</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Floating Action Button -->
    <a href="add-record.html" class="fixed bottom-24 right-4 bg-green-700 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-xl hover:bg-green-800 transition-all hover:scale-110 active:scale-95 z-30">
        <i class="lucide lucide-plus text-3xl"></i>
    </a>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2 max-w-sm"></div>

    <script type="module" src="./js/firebase-config.js"></script>
    <script src="./js/utils.js"></script>
    <script type="module" src="./js/history.js"></script>
</body>
</html>
