<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoCare - Add Record</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.16.29/font/lucide.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen pb-32">
    <div class="max-w-lg mx-auto">
        <div class="p-4 space-y-6">
            <!-- Header -->
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()" class="p-2.5 bg-white rounded-full shadow-md hover:bg-gray-50 transition-colors">
                    <i class="lucide lucide-arrow-left text-gray-600 text-xl"></i>
                </button>
                <div>
                    <h1 class="text-3xl text-gray-800">Add Record</h1>
                    <p class="text-gray-500 text-sm mt-1">Log a new service or repair</p>
                </div>
            </div>

            <!-- Form -->
            <form id="addRecordForm" class="space-y-5">
                <!-- Service Title -->
                <div class="bg-white rounded-2xl p-5 shadow-md border border-gray-100">
                    <label class="flex items-center gap-2 text-gray-700 mb-3">
                        <i class="lucide lucide-wrench text-green-700 text-xl"></i>
                        Service/Repair Title
                    </label>
                    <input type="text" id="title" placeholder="e.g., Oil Change, Brake Replacement" required
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent">
                </div>

                <!-- Date & Cost -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white rounded-2xl p-5 shadow-md border border-gray-100">
                        <label class="flex items-center gap-2 text-gray-700 mb-3">
                            <i class="lucide lucide-calendar text-green-700 text-xl"></i>
                            Date
                        </label>
                        <input type="date" id="date" required
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent">
                    </div>

                    <div class="bg-white rounded-2xl p-5 shadow-md border border-gray-100">
                        <label class="flex items-center gap-2 text-gray-700 mb-3">
                            <i class="lucide lucide-dollar-sign text-green-700 text-xl"></i>
                            Cost
                        </label>
                        <input type="number" id="cost" placeholder="0.00" step="0.01" required
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent">
                    </div>
                </div>

                <!-- Mileage & Mechanic -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white rounded-2xl p-5 shadow-md border border-gray-100">
                        <label class="flex items-center gap-2 text-gray-700 mb-3">
                            <i class="lucide lucide-gauge text-green-700 text-xl"></i>
                            Mileage
                        </label>
                        <input type="number" id="mileage" placeholder="12,450" required
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent">
                    </div>

                    <div class="bg-white rounded-2xl p-5 shadow-md border border-gray-100">
                        <label class="flex items-center gap-2 text-gray-700 mb-3">
                            <i class="lucide lucide-user text-green-700 text-xl"></i>
                            Mechanic
                        </label>
                        <input type="text" id="mechanic" placeholder="Self Service" required
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent">
                    </div>
                </div>

                <!-- Category -->
                <div class="bg-white rounded-2xl p-5 shadow-md border border-gray-100">
                    <label class="flex items-center gap-2 text-gray-700 mb-3">
                        <i class="lucide lucide-file-text text-green-700 text-xl"></i>
                        Category
                    </label>
                    <select id="category" required
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent appearance-none cursor-pointer">
                        <option value="">Select a category</option>
                        <option value="Routine Maintenance">Routine Maintenance</option>
                        <option value="Major Repair">Major Repair</option>
                        <option value="Parts Replacement">Parts Replacement</option>
                        <option value="Tire Service">Tire Service</option>
                        <option value="Brake Service">Brake Service</option>
                        <option value="Engine Work">Engine Work</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <!-- Notes -->
                <div class="bg-white rounded-2xl p-5 shadow-md border border-gray-100">
                    <label class="flex items-center gap-2 text-gray-700 mb-3">
                        <i class="lucide lucide-file-text text-green-700 text-xl"></i>
                        Notes (Optional)
                    </label>
                    <textarea id="notes" placeholder="Add any additional details about the service..." rows="4"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent resize-none"></textarea>
                </div>

                <!-- Receipt Upload -->
                <div class="bg-white rounded-2xl p-5 shadow-md border border-gray-100">
                    <div class="flex items-center justify-between mb-3">
                        <label class="flex items-center gap-2 text-gray-700">
                            <i class="lucide lucide-camera text-green-700 text-xl"></i>
                            Receipt/Photo
                        </label>
                        <button type="button" id="removeReceiptBtn" class="text-red-500 text-sm items-center gap-1 hidden">
                            <i class="lucide lucide-x text-sm"></i>
                            Remove
                        </button>
                    </div>
                    <div id="uploadArea" class="w-full py-8 border-2 border-dashed border-gray-300 rounded-xl hover:border-green-700 hover:bg-green-50 transition-all flex flex-col items-center gap-2 text-gray-500 hover:text-green-700 cursor-pointer">
                        <i class="lucide lucide-camera text-3xl"></i>
                        <span class="text-sm">Tap to add receipt or photo</span>
                        <input type="file" id="receiptInput" class="hidden" accept="image/*">
                    </div>
                    <div id="receiptPreview" class="bg-green-50 border border-green-200 rounded-xl p-4 items-center gap-3 hidden">
                        <div class="w-12 h-12 bg-green-700 rounded-lg flex items-center justify-center">
                            <i class="lucide lucide-file-text text-white text-2xl"></i>
                        </div>
                        <div class="flex-1">
                            <p class="text-sm font-medium text-gray-800" id="receiptFileName">Receipt_2026.jpg</p>
                            <p class="text-xs text-gray-500" id="receiptFileSize">245 KB</p>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="window.history.back()" id="cancelBtn"
                        class="flex-1 py-4 bg-white text-gray-700 rounded-xl border border-gray-200 hover:bg-gray-50 transition-colors shadow-sm">
                        Cancel
                    </button>
                    <button type="submit" id="submitBtn"
                        class="flex-1 py-4 bg-green-700 text-white rounded-xl hover:bg-green-800 transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2">
                        Save Record
                    </button>
                </div>
            </form>

            <!-- Quick Tips -->
            <div class="bg-gradient-to-r from-green-50 to-green-100 rounded-2xl p-5 border border-green-200">
                <h3 class="text-green-700 font-medium mb-2 flex items-center gap-2">
                    <i class="lucide lucide-file-text text-xl"></i>
                    Quick Tips
                </h3>
                <ul class="text-sm text-gray-700 space-y-1.5">
                    <li class="flex items-start gap-2">
                        <span class="text-green-700 mt-0.5">•</span>
                        <span>Always record the exact mileage for better tracking</span>
                    </li>
                    <li class="flex items-start gap-2">
                        <span class="text-green-700 mt-0.5">•</span>
                        <span>Upload receipts to keep all documents organized</span>
                    </li>
                    <li class="flex items-start gap-2">
                        <span class="text-green-700 mt-0.5">•</span>
                        <span>Add detailed notes for future reference</span>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <div id="mobileNav"></div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2 max-w-sm"></div>

    <script type="module" src="./js/firebase-config.js"></script>
    <script type="module" src="./js/utils.js"></script>
    <script type="module" src="./js/mobile-nav.js"></script>
    <script type="module" src="./js/addRecord.js"></script>
</body>
</html>
