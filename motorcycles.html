<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoCare - My Motorcycles</title>
    <link rel="icon" href="assets/images/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-k6RqeWeci5ZR/Lv4MR0sA0FfDOM7XwYq3q1Y5XvV6p3q1QZ1+6q6Q5Y5K5J5K5J5K5J5K5J5K5J5K5J5K5J5w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .slide-up {
            animation: slideUp 0.3s ease-out;
        }
        .fade-in {
            animation: fadeIn 0.2s ease-out;
        }
        .modal-backdrop {
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">
    <div class="max-w-lg mx-auto">
        <div class="p-4 space-y-6">
            <!-- Header -->
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl text-gray-800">My Motorcycles</h1>
                    <p class="text-gray-500 text-sm mt-1">Manage your bike collection</p>
                </div>
            </div>

            <!-- Empty State (shown when no motorcycles) -->
            <div id="emptyState" class="bg-white rounded-2xl p-10 shadow-md border border-gray-100 text-center hidden max-w-2xl mx-auto">
                <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fa-solid fa-motorcycle text-gray-400 text-5xl"></i>
                </div>
                <h3 class="text-gray-800 font-medium mb-2 text-lg">No motorcycles yet</h3>
                <p class="text-gray-500 text-sm mb-6">Add your first motorcycle to get started</p>
                <button onclick="openAddModal()" class="bg-green-700 text-white px-6 py-3 rounded-full hover:bg-green-800 transition-all shadow-lg active:scale-95 inline-flex items-center gap-3">
                    <i class="fa-solid fa-plus"></i>
                    <span class="font-medium">Add Motorcycle</span>
                </button>
            </div>

            <!-- Motorcycles List -->
            <div id="motorcyclesList" class="space-y-4">
                <!-- Will be populated by JavaScript -->
            </div>

            <!-- Add Another Button -->
            <button id="addAnotherBtn" onclick="openAddModal()" class="w-full py-4 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 hover:border-green-700 hover:text-green-700 hover:bg-green-50 transition-all flex items-center justify-center gap-2 hidden">
                <i class="lucide lucide-plus text-xl"></i>
                Add Another Motorcycle
            </button>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-40">
        <div class="max-w-lg mx-auto px-4 py-2">
            <div class="flex justify-around items-center">
                <a href="dashboard.html" class="flex flex-col items-center py-2 px-3 rounded-lg transition-all text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-house text-2xl"></i>
                    <span class="text-xs mt-1 font-medium">Home</span>
                </a>
                <a href="motorcycles.html" class="flex flex-col items-center py-2 px-3 rounded-lg transition-all text-green-700">
                    <i class="fa-solid fa-motorcycle text-2xl scale-110"></i>
                    <span class="text-xs mt-1 font-medium">Motorcycles</span>
                    <div class="absolute -bottom-0.5 w-12 h-1 bg-green-700 rounded-full"></div>
                </a>
                <a href="schedule.html" class="flex flex-col items-center py-2 px-3 rounded-lg transition-all text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-calendar-days text-2xl"></i>
                    <span class="text-xs mt-1 font-medium">Schedule</span>
                </a>
                <a href="history.html" class="flex flex-col items-center py-2 px-3 rounded-lg transition-all text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-clock text-2xl"></i>
                    <span class="text-xs mt-1 font-medium">History</span>
                </a>
                <a href="expenses.html" class="flex flex-col items-center py-2 px-3 rounded-lg transition-all text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-dollar-sign text-2xl"></i>
                    <span class="text-xs mt-1 font-medium">Expenses</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Floating Action Button -->
        <a href="add-record.html" class="fixed bottom-24 right-4 bg-green-700 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-xl hover:bg-green-800 transition-all hover:scale-110 active:scale-95 z-30">
        <i class="fa-solid fa-plus text-2xl"></i>
    </a>

    <!-- Add/Edit Modal -->
    <div id="motorcycleModal" class="fixed inset-0 z-50 hidden">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black/50 modal-backdrop" onclick="closeModal()"></div>
        
        <!-- Modal Content -->
        <div class="absolute inset-x-0 bottom-0 bg-white rounded-t-3xl p-6 max-h-[90vh] overflow-y-auto slide-up">
            <div class="max-w-lg mx-auto">
                <!-- Modal Header -->
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold text-gray-800" id="modalTitle">Add Motorcycle</h2>
                    <button onclick="closeModal()" class="p-2 hover:bg-gray-100 rounded-full transition-colors">
                        <i class="fa-solid fa-xmark text-gray-600 text-2xl"></i>
                    </button>
                </div>

                <!-- Form -->
                <form id="motorcycleForm" class="space-y-4">
                    <!-- Brand Dropdown -->
                    <div>
                        <label class="block text-gray-700 mb-2 text-sm font-medium">Brand *</label>
                        <select id="brandSelect" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent">
                            <option value="">Select Brand</option>
                        </select>
                    </div>

                    <!-- Model Dropdown -->
                    <div>
                        <label class="block text-gray-700 mb-2 text-sm font-medium">Model *</label>
                        <select id="modelSelect" required disabled class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent disabled:opacity-50 disabled:cursor-not-allowed">
                            <option value="">Select Brand First</option>
                        </select>
                    </div>

                    <!-- Year Dropdown -->
                    <div>
                        <label class="block text-gray-700 mb-2 text-sm font-medium">Year *</label>
                        <select id="yearSelect" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent">
                            <option value="">Select Year</option>
                        </select>
                    </div>

                    <!-- Plate Number -->
                    <div>
                        <label class="block text-gray-700 mb-2 text-sm font-medium">Plate Number *</label>
                        <input type="text" id="plateInput" placeholder="ABC-1234" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent uppercase">
                    </div>

                    <!-- Color -->
                    <div>
                        <label class="block text-gray-700 mb-2 text-sm font-medium">Color *</label>
                        <input type="text" id="colorInput" placeholder="e.g., Red, Black, Blue" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent">
                    </div>

                    <!-- Mileage -->
                    <div>
                        <label class="block text-gray-700 mb-2 text-sm font-medium">Current Mileage *</label>
                        <input type="number" id="mileageInput" placeholder="12450" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent">
                    </div>

                    <!-- Action Buttons -->
                    <div class="flex gap-3 pt-4">
                        <button type="button" onclick="closeModal()" class="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl hover:bg-gray-300 transition-all active:scale-95">
                            Cancel
                        </button>
                        <button type="submit" class="flex-1 py-3 bg-green-700 text-white rounded-xl hover:bg-green-800 transition-all shadow-lg active:scale-95">
                            <span id="submitBtnText">Add Motorcycle</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2 max-w-sm"></div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteMotorcycleModal" class="fixed inset-0 z-[60] hidden">
        <div id="deleteMotorcycleBackdrop" class="absolute inset-0 bg-black/50 modal-backdrop" onclick="closeDeleteMotorcycleModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-6 slide-up">
                <div class="flex items-start gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-red-100 text-red-600 flex items-center justify-center shrink-0">
                        <i class="fa-solid fa-triangle-exclamation text-xl"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-xl font-bold text-gray-900">Delete motorcycle?</h3>
                        <p class="text-sm text-gray-600 mt-2">
                            Are you sure you want to delete <span id="deleteMotorcycleLabel" class="font-semibold text-gray-900">this motorcycle</span>? This action can’t be undone.
                        </p>
                    </div>
                </div>

                <div class="mt-6 flex gap-3">
                    <button type="button" onclick="closeDeleteMotorcycleModal()" class="flex-1 py-3 rounded-xl bg-gray-100 text-gray-700 font-medium hover:bg-gray-200 transition-colors active:scale-95">
                        No, keep it
                    </button>
                    <button type="button" onclick="confirmDeleteMotorcycle()" class="flex-1 py-3 rounded-xl bg-red-600 text-white font-medium hover:bg-red-700 transition-colors active:scale-95">
                        Yes, delete
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./js/firebase-config.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/motorcycles.js?v=2"></script>
</body>
</html>
