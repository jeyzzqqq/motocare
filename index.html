<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoCare - Login</title>
    <link rel="icon" href="assets/images/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.16.29/font/lucide.min.css" rel="stylesheet">
    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .fade-in-up {
            animation: fadeInUp 0.5s ease-out;
        }
        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }
        .scale-in {
            animation: scaleIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        /* Password toggle button styling */
        .password-toggle-btn {
            background: none;
            border: none;
            padding: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .password-toggle-btn:hover i {
            color: #059669;
        }
        .password-toggle-btn i {
            transition: color 0.2s ease;
            color: #6b7280; /* default gray */
            font-size: 1rem;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-green-700 to-green-900 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md fade-in-up">
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <!-- Logo Section -->
            <div class="bg-green-700 p-8 text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-full mb-3 scale-in overflow-hidden">
                    <img src="assets/images/logo.png" alt="MotoCare logo" class="w-12 h-12 object-contain">
                </div>
                <h1 class="text-white text-2xl font-bold">MotoCare</h1>
                <p class="text-green-100 text-sm mt-1">Your Motorcycle Companion</p>
            </div>

            <!-- Form Section -->
            <div class="p-8">
                <!-- Toggle Buttons -->
                <div class="flex gap-2 mb-6">
                    <button id="loginTab" onclick="switchTab('login')" class="flex-1 py-2.5 rounded-lg transition-all bg-green-700 text-white">
                        Login
                    </button>
                    <button id="signupTab" onclick="switchTab('signup')" class="flex-1 py-2.5 rounded-lg transition-all bg-gray-100 text-gray-600">
                        Sign Up
                    </button>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-gray-700 mb-2">Email</label>
                        <div class="relative">
                            <i class="lucide lucide-mail absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="email" id="loginEmail" placeholder="Enter your email" required
                                class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent transition-all">
                        </div>
                    </div>

                    <div>
                        <label class="block text-gray-700 mb-2">Password</label>
                        <div class="relative">
                            <i class="lucide lucide-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                            <input type="password" id="loginPassword" placeholder="Enter your password" required
                                class="w-full pl-11 pr-11 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent transition-all">
                            <button type="button" id="loginPasswordToggle" aria-pressed="false" title="Show password" onclick="togglePasswordVisibility('loginPassword', 'loginPasswordToggle')" class="absolute right-3 top-1/2 -translate-y-1/2 hover:text-gray-600 transition-colors cursor-pointer password-toggle-btn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="color:#6b7280" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"></path>
                                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6" fill="none"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="flex justify-end">
                        <button type="button" class="text-sm text-green-700 hover:underline">
                            Forgot Password?
                        </button>
                    </div>

                    <button type="submit" class="w-full bg-green-700 text-white py-3.5 rounded-xl hover:bg-green-800 transition-all shadow-lg hover:shadow-xl active:scale-95 font-medium">
                        <i class="lucide lucide-log-in mr-2"></i>Login
                    </button>
                </form>

                <!-- Signup Form (Hidden by default) -->
                <form id="signupForm" class="space-y-4 hidden">
                    <div>
                        <label class="block text-gray-700 mb-2">Email</label>
                        <div class="relative">
                            <i class="lucide lucide-mail absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="email" id="signupEmail" placeholder="Enter your email" required
                                class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent transition-all">
                        </div>
                    </div>

                    <div>
                        <label class="block text-gray-700 mb-2">Password</label>
                        <div class="relative">
                            <i class="lucide lucide-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                            <input type="password" id="signupPassword" placeholder="Enter your password" required
                                class="w-full pl-11 pr-11 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent transition-all">
                            <button type="button" id="signupPasswordToggle" aria-pressed="false" title="Show password" onclick="togglePasswordVisibility('signupPassword', 'signupPasswordToggle')" class="absolute right-3 top-1/2 -translate-y-1/2 hover:text-gray-600 transition-colors cursor-pointer password-toggle-btn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="color:#6b7280" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"></path>
                                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6" fill="none"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-gray-700 mb-2">Confirm Password</label>
                        <div class="relative">
                            <i class="lucide lucide-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                            <input type="password" id="signupConfirmPassword" placeholder="Confirm your password" required
                                class="w-full pl-11 pr-11 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent transition-all">
                            <button type="button" id="confirmPasswordToggle" aria-pressed="false" title="Show password" onclick="togglePasswordVisibility('signupConfirmPassword', 'confirmPasswordToggle')" class="absolute right-3 top-1/2 -translate-y-1/2 hover:text-gray-600 transition-colors cursor-pointer password-toggle-btn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="color:#6b7280" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"></path>
                                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6" fill="none"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-green-700 text-white py-3.5 rounded-xl hover:bg-green-800 transition-all shadow-lg hover:shadow-xl active:scale-95 font-medium">
                        <i class="lucide lucide-user-plus mr-2"></i>Sign Up
                    </button>
                </form>

                <!-- Divider -->
                <div class="mt-6 mb-6 flex items-center gap-3">
                    <div class="flex-1 h-px bg-gray-200"></div>
                    <span class="text-gray-400 text-sm">or</span>
                    <div class="flex-1 h-px bg-gray-200"></div>
                </div>

                <!-- Google Sign-In Button -->
                <button id="googleSignInBtn" class="w-full bg-white border-2 border-gray-200 text-gray-700 py-3.5 rounded-xl hover:bg-gray-50 hover:border-gray-300 transition-all flex items-center justify-center gap-3 shadow-md hover:shadow-lg active:scale-95">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span class="font-medium">Continue with Google</span>
                </button>

                <div class="mt-6 text-center">
                    <p class="text-gray-500 text-sm">
                        <span id="switchText">Don't have an account?</span>
                        <button onclick="toggleForm()" class="text-green-700 font-medium hover:underline ml-1" id="switchBtn">Sign Up</button>
                    </p>
                </div>
            </div>
        </div>

        <p class="text-white text-center mt-6 text-sm opacity-90">
            Manage your motorcycle maintenance with ease
        </p>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2 max-w-sm"></div>

    <!-- Firebase -->
    <script type="module" src="./js/firebase-config.js"></script>
    <script type="module" src="./js/auth.js"></script>
    <script src="./js/utils.js"></script>
    
    <script type="module">
        import { login, signUp, googleSignIn } from "./js/auth.js";

        let isLoginMode = true;

        function switchTab(mode) {
            isLoginMode = mode === 'login';
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');

            if (isLoginMode) {
                loginTab.className = 'flex-1 py-2.5 rounded-lg transition-all bg-green-700 text-white';
                signupTab.className = 'flex-1 py-2.5 rounded-lg transition-all bg-gray-100 text-gray-600';
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                document.getElementById('switchText').textContent = "Don't have an account?";
                document.getElementById('switchBtn').textContent = "Sign Up";
            } else {
                loginTab.className = 'flex-1 py-2.5 rounded-lg transition-all bg-gray-100 text-gray-600';
                signupTab.className = 'flex-1 py-2.5 rounded-lg transition-all bg-green-700 text-white';
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                document.getElementById('switchText').textContent = "Already have an account?";
                document.getElementById('switchBtn').textContent = "Login";
            }
        }

        function toggleForm() {
            switchTab(isLoginMode ? 'signup' : 'login');
        }

        // Expose functions to global scope for inline onclick handlers
        window.switchTab = switchTab;
        window.toggleForm = toggleForm;

        // PASSWORD TOGGLE FUNCTIONALITY
        window.togglePasswordVisibility = function(inputId, toggleBtnId) {
            const input = document.getElementById(inputId);
            const toggleBtn = document.getElementById(toggleBtnId);

            if (!input || !toggleBtn) return;

            // Debug log for visibility during development
            console.debug('togglePasswordVisibility called for', inputId);

            // Determine new state
            const willShow = input.type === 'password';
            input.type = willShow ? 'text' : 'password';

            // Update accessible attributes
            toggleBtn.setAttribute('aria-pressed', willShow ? 'true' : 'false');
            toggleBtn.title = willShow ? 'Hide password' : 'Show password';

            // Replace inner HTML with explicit icon markup so the visual always updates
            const iconHtml = willShow
                ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="color:#6b7280" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">\n                    <path d="M2 2l20 20" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path>\n                    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"></path>\n                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6" fill="none"></circle>\n                </svg>'
                : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="color:#6b7280" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">\n                    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"></path>\n                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6" fill="none"></circle>\n                </svg>';
            toggleBtn.innerHTML = iconHtml;
        };

        // LOGIN FORM SUBMISSION
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                await login(email, password);
                showToast('Login successful!', 'success');
                setTimeout(() => {
                    window.location.href = './dashboard.html';
                }, 1000);
            } catch (error) {
                showToast(error.message || 'Login failed', 'error');
                console.error('Login error:', error);
            }
        });

        // SIGNUP FORM SUBMISSION
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;

            if (password !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }

            try {
                console.debug('Attempting signUp for', email);
                const userCred = await signUp(email, password);
                console.debug('signUp success', userCred);
                showToast('Sign up successful! Logging you in...', 'success');
                setTimeout(() => {
                    window.location.href = './dashboard.html';
                }, 1000);
            } catch (error) {
                const code = error.code || 'unknown';
                const msg = error.message || 'Sign up failed';
                showToast(`${msg} (${code})`, 'error');
                console.error('Sign up error:', error);
            }
        });

        // GOOGLE SIGN-IN BUTTON
        document.getElementById('googleSignInBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            try {
                console.debug('Starting Google sign-in');
                await googleSignIn();
                showToast('Signed in with Google', 'success');
                setTimeout(() => { window.location.href = './dashboard.html'; }, 800);
            } catch (error) {
                const code = error.code || 'unknown';
                showToast(error.message ? `${error.message} (${code})` : 'Google sign-in failed', 'error');
                console.error('Google sign-in error:', error);
            }
        });
    </script>
</body>
</html>
